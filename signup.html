<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up - PassGuard</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 20px;
      padding: 48px 42px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
      animation: floatIn 0.5s ease forwards;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 6px;
      color: var(--primary);
    }

    .auth-logo svg {
      width: 2rem;
      height: 2rem;
    }

    .auth-title {
      text-align: center;
      font-size: 1.7rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 4px;
    }

    .auth-subtitle {
      text-align: center;
      color: #374151;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }

    .auth-subtitle a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: underline;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1.5px solid rgba(99, 102, 241, 0.25);
      background: rgba(255, 255, 255, 0.55);
      color: #0f172a;
      font-size: 0.97rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-top: 0;
    }

    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
    }

    .auth-btn {
      width: 100%;
      justify-content: center;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 4px;
      font-family: "Playfair Display", serif;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
    }

    .auth-btn:active {
      transform: translateY(0);
    }

    .auth-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }

    .auth-success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }

    .password-hint {
      color: #6b7280;
      font-size: 0.78rem;
      margin-top: 4px;
    }

    .auth-divider {
      text-align: center;
      color: #6b7280;
      font-size: 0.85rem;
      margin: 20px 0 0;
    }

    .back-home {
      display: inline-flex;
      justify-content: center;
      width: 100%;
      margin-top: 18px;
      color: #6b7280;
      font-size: 0.85rem;
    }

    .back-home:hover { color: var(--primary); }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo"><i data-lucide="lock-keyhole"></i></div>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">
      Already have an account? <a href="login.html">Log in</a>
    </p>

    <div class="auth-error" id="signupError"></div>
    <div class="auth-success" id="signupSuccess"></div>

    <form id="signupForm" novalidate>
      <div class="form-group">
        <label for="signupName">Full name</label>
        <input
          type="text"
          id="signupName"
          placeholder="Jane Smith"
          required
          autocomplete="name"
        >
      </div>

      <div class="form-group">
        <label for="signupEmail">Email address</label>
        <input
          type="email"
          id="signupEmail"
          placeholder="you@example.com"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="signupPassword">Password</label>
        <input
          type="password"
          id="signupPassword"
          placeholder="Min. 6 characters"
          required
          autocomplete="new-password"
        >
        <p class="password-hint">Use at least 6 characters for a secure password.</p>
      </div>

      <div class="form-group">
        <label for="signupConfirm">Confirm password</label>
        <input
          type="password"
          id="signupConfirm"
          placeholder="Repeat your password"
          required
          autocomplete="new-password"
        >
      </div>

      <button type="submit" class="auth-btn btn-icon"><span>Create Account</span><i data-lucide="arrow-right"></i></button>
    </form>

    <div class="auth-divider">PassGuard keeps your passwords safe &amp; private.</div>
    <a class="back-home btn-icon" href="index.html"><i data-lucide="arrow-left"></i><span>Back to home</span></a>

  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="scripts/lucide-init.js"></script>
<script src="scripts/auth.js"></script>
<script>
  if (getSession()) window.location.href = 'dashboard.html';

  document.getElementById('signupForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const name     = document.getElementById('signupName').value.trim();
    const email    = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm  = document.getElementById('signupConfirm').value;
    const errEl    = document.getElementById('signupError');
    const succEl   = document.getElementById('signupSuccess');
    const btn      = this.querySelector('button[type="submit"]');

    errEl.style.display  = 'none';
    succEl.style.display = 'none';

    if (!name || !email || !password || !confirm) {
      errEl.textContent   = 'Please fill in all fields.';
      errEl.style.display = 'block';
      return;
    }
    if (password.length < 6) {
      errEl.textContent   = 'Password must be at least 6 characters.';
      errEl.style.display = 'block';
      return;
    }
    if (password !== confirm) {
      errEl.textContent   = 'Passwords do not match.';
      errEl.style.display = 'block';
      return;
    }

    btn.disabled  = true;
    btn.innerHTML = '<span>Creating account…</span>';

    const result = await signUp(name, email, password);
    if (result.ok) {
      succEl.textContent   = 'Account created! Please log in to continue.';
      succEl.style.display = 'block';
      document.getElementById('signupForm').reset();
      setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    } else {
      errEl.textContent   = result.error;
      errEl.style.display = 'block';
      btn.disabled        = false;
      btn.innerHTML       = '<span>Create Account</span><i data-lucide="arrow-right"></i>';
      lucide.createIcons();
    }
  });
</script>

</body>
</html>
